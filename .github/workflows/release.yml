name: Release

# Publish to PyPI on a version tag (e.g. v0.2.0) via Trusted Publishing.
# One-time setup: add fed-env as a trusted publisher on PyPI for this repo.
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI Trusted Publishing (no API token)
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
