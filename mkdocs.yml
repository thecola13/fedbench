site_name: fed-playground
site_description: A modular, pure-NumPy federated learning simulation and benchmark framework
site_url: https://fedbench.colaciluca.it/
repo_url: https://github.com/thecola13/fedbench
exclude_docs: |
  specs/

theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_root_heading: true
            show_source: false
            members_order: source
            docstring_style: google
nav:
  - Home: index.md
  - API reference: api.md
  - Extending: extending.md
  - Benchmark study: study.md
markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: [.]
